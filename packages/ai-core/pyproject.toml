[project]
name = "ai-core"
version = "0.1.0"
description = "SoulForge AI Core - Prompt Builder, RAG Engine, AI Pipeline"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "asyncpg>=0.30",
    "redis>=5.2",
    "pymilvus>=2.4",
    "dashscope>=1.22",
    "jinja2>=3.1",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "minio>=7.2",
    "httpx>=0.28",
    "numpy>=2.0",
    "openai>=1.50",
    "edge-tts>=6.1",
    "cryptography>=43.0",
    "slowapi>=0.1.9",
    "structlog>=24.0",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_core"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
