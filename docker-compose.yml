services:
  # ─── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: soulforge-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: soulforge
      POSTGRES_PASSWORD: soulforge_dev
      POSTGRES_DB: soulforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: soulforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Milvus (standalone) ─────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: soulforge-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4-latest
    container_name: soulforge-milvus
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO (S3-compatible storage) ───────────
  minio:
    image: minio/minio:latest
    container_name: soulforge-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO bucket init ──────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: soulforge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set sf http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing sf/voice-profiles;
      mc mb --ignore-existing sf/character-avatars;
      mc mb --ignore-existing sf/rag-documents;
      mc anonymous set download sf/character-avatars;
      echo 'MinIO buckets initialized';
      "

volumes:
  postgres_data:
  redis_data:
  milvus_data:
  etcd_data:
  minio_data:
