version: "3.8"

services:
  # ─── Infrastructure ────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soulforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-soulforge_prod}
      POSTGRES_DB: soulforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-soulforge_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-soulforge_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4-latest
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ─── Application Services ──────────────────────
  admin-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin-web
    environment:
      DATABASE_URL: postgresql://soulforge:${DB_PASSWORD:-soulforge_prod}@postgres:5432/soulforge
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AI_CORE_URL: http://ai-core:8100
      SERVICE_TOKEN: ${SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ai-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-core
    environment:
      DATABASE_URL: postgresql://soulforge:${DB_PASSWORD:-soulforge_prod}@postgres:5432/soulforge
      REDIS_URL: redis://:${REDIS_PASSWORD:-soulforge_redis}@redis:6379/0
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-dashscope}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-7b-instruct}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      TTS_PROVIDER: ${TTS_PROVIDER:-dashscope}
      ASR_PROVIDER: ${ASR_PROVIDER:-dashscope}
      MASTER_SECRET: ${MASTER_SECRET}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    environment:
      DATABASE_URL: postgresql://soulforge:${DB_PASSWORD:-soulforge_prod}@postgres:5432/soulforge
      REDIS_URL: redis://:${REDIS_PASSWORD:-soulforge_redis}@redis:6379/0
      AI_CORE_URL: http://ai-core:8100
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      ENVIRONMENT: production
    depends_on:
      ai-core:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Reverse Proxy ─────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-web
      - ai-core
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  milvus_data:
  minio_data:
