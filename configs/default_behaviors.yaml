# SoulForge Behavior Engine Configuration

# Ambient behaviors
ambient:
  breathing:
    rate_bpm: 15
    amplitude: 0.03
    asymmetry: 1.3        # >1 = exhale slower than inhale
  eye_saccade:
    frequency_hz: 2.5
    max_amplitude_deg: 4.0
  idle_shift:
    amplitude: 0.02
  micro_expression:
    trigger_probability_per_sec: 0.15

# Triggered behavior library
# Each behavior has attack/sustain/release in ms + channel keyframes
triggered:
  greeting_wave:
    priority: 5
    interruptible: true
    attack_ms: 200
    sustain_ms: 800
    release_ms: 300
  surprised_jump:
    priority: 8
    interruptible: false
    attack_ms: 80
    sustain_ms: 200
    release_ms: 400
  listening_nod:
    priority: 3
    interruptible: true
    attack_ms: 100
    sustain_ms: 0
    release_ms: 200
  thinking_look_up:
    priority: 4
    interruptible: true
    attack_ms: 400
    sustain_ms: 1500
    release_ms: 300
  happy_wiggle:
    priority: 5
    interruptible: true
    attack_ms: 100
    sustain_ms: 600
    release_ms: 200

# Reactive layer rules
reactive:
  - sensor_id: touch_head
    threshold_min: 0.5
    cooldown_s: 0.5
    channel_outputs: {head_pitch: -5.0}
  - sensor_id: touch_belly
    threshold_min: 0.5
    cooldown_s: 2.0
    trigger_behavior: happy_wiggle
  - sensor_id: proximity_front
    threshold_max: 0.3
    cooldown_s: 1.0
    channel_outputs: {body_pitch: -5.0, head_pitch: 8.0}
  - sensor_id: imu_shake
    threshold_min: 2.0
    cooldown_s: 3.0
    trigger_behavior: surprised_jump
