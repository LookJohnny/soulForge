name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-js:
    name: Lint & Type Check (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd packages/database && npx prisma generate
      - run: cd apps/admin-web && pnpm lint

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv tool install ruff
      - run: ruff check packages/ai-core/src packages/gateway/src
      - run: ruff format --check packages/ai-core/src packages/gateway/src

  test-ai-core:
    name: Test AI Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd packages/ai-core && uv sync --dev
      - run: cd packages/ai-core && uv run pytest tests/ -v --tb=short || true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build AI Core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ai-core
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gateway
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
